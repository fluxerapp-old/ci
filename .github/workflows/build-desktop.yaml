name: build desktop

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel label (stable or canary). Source is always fluxer-private@main.
        required: false
        type: choice
        options:
          - stable
          - canary
        default: stable
      skip_windows:
        description: Skip Windows builds
        required: false
        default: false
        type: boolean
      skip_macos:
        description: Skip macOS builds
        required: false
        default: false
        type: boolean
      skip_linux:
        description: Skip Linux builds
        required: false
        default: false
        type: boolean
      skip_windows_x64:
        description: Skip Windows x64 builds
        required: false
        default: false
        type: boolean
      skip_windows_arm64:
        description: Skip Windows ARM64 builds
        required: false
        default: false
        type: boolean
      skip_macos_x64:
        description: Skip macOS x64 builds
        required: false
        default: false
        type: boolean
      skip_macos_arm64:
        description: Skip macOS ARM64 builds
        required: false
        default: false
        type: boolean
      skip_linux_x64:
        description: Skip Linux x64 builds
        required: false
        default: false
        type: boolean
      skip_linux_arm64:
        description: Skip Linux ARM64 builds
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: desktop-${{ inputs.channel }}
  cancel-in-progress: true

env:
  CHANNEL: ${{ inputs.channel }}
  BUILD_CHANNEL: ${{ inputs.channel == 'canary' && 'canary' || 'stable' }}

jobs:
  meta:
    name: Resolve build metadata
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25
    outputs:
      version: ${{ steps.meta.outputs.version }}
      pub_date: ${{ steps.meta.outputs.pub_date }}
      channel: ${{ steps.meta.outputs.channel }}
      build_channel: ${{ steps.meta.outputs.build_channel }}
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set metadata
        id: meta
        run: >-
          python3 scripts/ci/workflows/build_desktop.py
          --step set_metadata
          --channel "${{ inputs.channel }}"

  matrix:
    name: Resolve build matrix
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build platform matrix
        id: set-matrix
        run: >-
          python3 scripts/ci/workflows/build_desktop.py
          --step set_matrix
          --skip-windows "${{ inputs.skip_windows }}"
          --skip-windows-x64 "${{ inputs.skip_windows_x64 }}"
          --skip-windows-arm64 "${{ inputs.skip_windows_arm64 }}"
          --skip-macos "${{ inputs.skip_macos }}"
          --skip-macos-x64 "${{ inputs.skip_macos_x64 }}"
          --skip-macos-arm64 "${{ inputs.skip_macos_arm64 }}"
          --skip-linux "${{ inputs.skip_linux }}"
          --skip-linux-x64 "${{ inputs.skip_linux_x64 }}"
          --skip-linux-arm64 "${{ inputs.skip_linux_arm64 }}"

  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    needs:
      - meta
      - matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    env:
      CHANNEL: ${{ needs.meta.outputs.channel }}
      BUILD_CHANNEL: ${{ needs.meta.outputs.build_channel }}
      VERSION: ${{ needs.meta.outputs.version }}
      PUB_DATE: ${{ needs.meta.outputs.pub_date }}
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}
      ELECTRON_ARCH: ${{ matrix.electron_arch }}
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: _ci

      - name: Clone fluxer-private source (Unix)
        if: runner.os != 'Windows'
        run: >-
          git clone --depth 1 --branch main
          "https://x-access-token:${{ secrets.FLUXER_PRIVATE_PAT }}@github.com/fluxerapp-old/fluxer-private.git"
          source

      - name: Clone fluxer-private source (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: >-
          git clone --depth 1 --branch main
          "https://x-access-token:${{ secrets.FLUXER_PRIVATE_PAT }}@github.com/fluxerapp-old/fluxer-private.git"
          source

      - name: Shorten Windows paths (workspace + temp for Squirrel) and pin pnpm store
        if: runner.os == 'Windows'
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step windows_paths
        env:
          SUBST_TARGET: ${{ github.workspace }}/source

      - name: Set workdir (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "WORKDIR=${{ github.workspace }}/source" >> "$GITHUB_ENV"

      - name: Set up pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 24

      - name: Resolve pnpm store path (Windows)
        if: runner.os == 'Windows'
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step resolve_pnpm_store_windows

      - name: Resolve pnpm store path (Unix)
        if: runner.os != 'Windows'
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step resolve_pnpm_store_unix

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('source/**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Python setuptools (Windows ARM64)
        if: matrix.platform == 'windows' && matrix.arch == 'arm64'
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step install_setuptools_windows_arm64

      - name: Install Python setuptools (macOS)
        if: matrix.platform == 'macos'
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step install_setuptools_macos

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step install_linux_deps

      - name: Install dependencies
        working-directory: ${{ env.WORKDIR }}/fluxer_desktop
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step install_dependencies

      - name: Update version
        working-directory: ${{ env.WORKDIR }}/fluxer_desktop
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step update_version

      - name: Set build channel
        working-directory: ${{ env.WORKDIR }}/fluxer_desktop
        env:
          BUILD_CHANNEL: ${{ env.BUILD_CHANNEL }}
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step set_build_channel

      - name: Build Electron main process
        working-directory: ${{ env.WORKDIR }}/fluxer_desktop
        env:
          BUILD_CHANNEL: ${{ env.BUILD_CHANNEL }}
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step build_electron_main

      - name: Build Electron app (macOS)
        if: matrix.platform == 'macos'
        working-directory: ${{ env.WORKDIR }}/fluxer_desktop
        env:
          BUILD_CHANNEL: ${{ env.BUILD_CHANNEL }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step build_app_macos

      - name: Verify macOS artifact (bundle ID + profile + signature)
        if: matrix.platform == 'macos'
        working-directory: ${{ env.WORKDIR }}/fluxer_desktop
        env:
          BUILD_CHANNEL: ${{ env.BUILD_CHANNEL }}
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step verify_bundle_id

      - name: Build Electron app (Windows)
        if: matrix.platform == 'windows'
        working-directory: ${{ env.WORKDIR }}/fluxer_desktop
        env:
          BUILD_CHANNEL: ${{ env.BUILD_CHANNEL }}
          TEMP: C:\t
          TMP: C:\t
          SQUIRREL_TEMP: C:\sq
          ELECTRON_BUILDER_CACHE: C:\ebcache
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step build_app_windows

      - name: Analyze Squirrel nupkg for long paths
        if: matrix.platform == 'windows'
        working-directory: ${{ env.WORKDIR }}/fluxer_desktop
        env:
          BUILD_VERSION: ${{ env.VERSION }}
          MAX_WINDOWS_PATH_LEN: 260
          PATH_HEADROOM: 10
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step analyse_squirrel_paths

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        working-directory: ${{ env.WORKDIR }}/fluxer_desktop
        env:
          BUILD_CHANNEL: ${{ env.BUILD_CHANNEL }}
          USE_SYSTEM_FPM: true
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step build_app_linux

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step prepare_artifacts_windows

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step prepare_artifacts_unix

      - name: Normalize updater YAML (arm64)
        if: matrix.arch == 'arm64'
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step normalise_updater_yaml

      - name: Generate SHA256 checksums (Unix)
        if: runner.os != 'Windows'
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step generate_checksums_unix

      - name: Generate SHA256 checksums (Windows)
        if: runner.os == 'Windows'
        run: >-
          python3 ${{ github.workspace }}/_ci/scripts/ci/workflows/build_desktop.py
          --step generate_checksums_windows

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fluxer-desktop-${{ env.BUILD_CHANNEL }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            upload_staging/*.exe
            upload_staging/*.exe.blockmap
            upload_staging/*.exe.sha256
            upload_staging/*.dmg
            upload_staging/*.dmg.sha256
            upload_staging/*.zip
            upload_staging/*.zip.blockmap
            upload_staging/*.zip.sha256
            upload_staging/*.AppImage
            upload_staging/*.AppImage.sha256
            upload_staging/*.deb
            upload_staging/*.deb.sha256
            upload_staging/*.rpm
            upload_staging/*.rpm.sha256
            upload_staging/*.tar.gz
            upload_staging/*.tar.gz.sha256
            upload_staging/*.yml
            upload_staging/*.nupkg
            upload_staging/*.nupkg.blockmap
            upload_staging/*.nupkg.sha256
            upload_staging/RELEASES*
          retention-days: 30

  check_signing:
    name: Check signing secrets
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check for Azure signing secrets
        id: check
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Windows code signing secrets not configured — skipping signing."
          fi

  sign_windows:
    name: Sign Windows artifacts (${{ matrix.arch }})
    if: ${{ needs.check_signing.outputs.enabled == 'true' }}
    needs:
      - meta
      - build
      - check_signing
    runs-on: windows-2025
    timeout-minutes: 25
    env:
      EXPECT_WINDOWS_X64: ${{ (inputs.skip_windows || inputs.skip_windows_x64) && 'false' || 'true' }}
      EXPECT_WINDOWS_ARM64: ${{ (inputs.skip_windows || inputs.skip_windows_arm64) && 'false' || 'true' }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - arm64
    steps:
      - name: Download Windows artifacts
        id: download_artifact
        if: (matrix.arch == 'x64' && env.EXPECT_WINDOWS_X64 == 'true') || (matrix.arch == 'arm64' && env.EXPECT_WINDOWS_ARM64 == 'true')
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: fluxer-desktop-${{ needs.meta.outputs.build_channel }}-windows-${{ matrix.arch }}
          path: artifacts/windows-${{ matrix.arch }}

      - name: Check whether artifacts exist for this arch
        id: check_artifacts
        shell: pwsh
        run: |
          $artifactPath = "artifacts/windows-${{ matrix.arch }}"
          $expected = if ("${{ matrix.arch }}" -eq "x64") { "${{ env.EXPECT_WINDOWS_X64 }}" } else { "${{ env.EXPECT_WINDOWS_ARM64 }}" }

          if (Test-Path $artifactPath) {
            $files = Get-ChildItem -Path $artifactPath -File -Recurse -ErrorAction SilentlyContinue
            if ($files.Count -gt 0) {
              "found=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
              Write-Host "Found Windows artifacts for ${{ matrix.arch }}."
              exit 0
            }
          }

          if ($expected -eq "true") {
            throw "Expected Windows artifacts for ${{ matrix.arch }}, but none were found."
          }

          "found=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "No Windows artifacts found for ${{ matrix.arch }}. Skipping signing for this arch."

      - name: Azure login for Artifact Signing
        if: steps.check_artifacts.outputs.found == 'true'
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows executables with Artifact Signing
        if: steps.check_artifacts.outputs.found == 'true'
        uses: azure/artifact-signing-action@5289deff81257f39600de2188534e17b633ba835 # v1
        with:
          endpoint: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\artifacts\windows-${{ matrix.arch }}
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify Authenticode signatures
        if: steps.check_artifacts.outputs.found == 'true'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "artifacts/windows-${{ matrix.arch }}" -Filter *.exe -File -Recurse
          if ($files.Count -eq 0) {
            throw "No executable files found to verify for ${{ matrix.arch }}."
          }

          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Signature verification failed for $($file.FullName): $($signature.Status)"
            }
          }

      - name: Regenerate SHA256 checksums for signed executables
        if: steps.check_artifacts.outputs.found == 'true'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "artifacts/windows-${{ matrix.arch }}" -Filter *.exe -File -Recurse
          foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLower()
            Set-Content -Path "$($file.FullName).sha256" -Value $hash -NoNewline
            Write-Host "Regenerated checksum for $($file.FullName)"
          }

      - name: Re-upload signed Windows artifacts
        if: steps.check_artifacts.outputs.found == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fluxer-desktop-${{ needs.meta.outputs.build_channel }}-windows-${{ matrix.arch }}
          path: artifacts/windows-${{ matrix.arch }}/*
          overwrite: true
          retention-days: 30

  upload:
    name: Upload to S3 (rclone)
    if: ${{ !failure() && !cancelled() }}
    needs:
      - meta
      - build
      - sign_windows
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25
    env:
      CHANNEL: ${{ needs.meta.outputs.build_channel }}
      DISPLAY_CHANNEL: ${{ needs.meta.outputs.channel }}
      VERSION: ${{ needs.meta.outputs.version }}
      PUB_DATE: ${{ needs.meta.outputs.pub_date }}
      S3_ENDPOINT: https://ewr1.vultrobjects.com
      S3_BUCKET: fluxer-downloads
      PUBLIC_DL_BASE: https://api.fluxer.app/dl
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: fluxer-desktop-${{ needs.meta.outputs.build_channel }}-*

      - name: Install rclone
        run: >-
          python3 scripts/ci/workflows/build_desktop.py
          --step install_rclone

      - name: Configure rclone (OVH S3)
        run: >-
          python3 scripts/ci/workflows/build_desktop.py
          --step configure_rclone

      - name: Build S3 payload layout (+ manifest.json)
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          PUB_DATE: ${{ needs.meta.outputs.pub_date }}
        run: >-
          python3 scripts/ci/workflows/build_desktop.py
          --step build_payload

      - name: Upload payload to S3
        run: >-
          python3 scripts/ci/workflows/build_desktop.py
          --step upload_payload

      - name: Build summary
        run: >-
          python3 scripts/ci/workflows/build_desktop.py
          --step build_summary
